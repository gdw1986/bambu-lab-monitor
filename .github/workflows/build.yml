name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
            apply-default-toolchain: true
          - platform: macos-latest
            target: aarch64-apple-darwin
            apply-default-toolchain: true
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Fix tauri.conf.json (disable devtools for faster builds)
        if: matrix.platform != 'windows-latest'
        run: |
          cd src-tauri
          $conf = Get-Content tauri.conf.json -Raw | ConvertFrom-Json
          $conf.tauri.bundle.active = $true
          $conf | ConvertTo-Json -Depth 10 | Set-Content tauri.conf.json -Encoding utf8

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src-tauri
          $target = '${{ matrix.target }}'
          $extraArgs = @()
          if ($target -ne '') { $extraArgs = @('--target', $target) }
          npx --yes tauri build --ci @extraArgs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**
          if-no-files-found: ignore
