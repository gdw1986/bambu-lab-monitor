name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: false
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macOS-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macOS-x64
          - platform: windows-latest
            args: ''
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install flask paho-mqtt

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'Bambu Monitor v${{ inputs.version }}'
          releaseBody: |
            ## 🖨 Bambu Lab Monitor v${{ inputs.version }}

            ### Downloads
            - **macOS**: `BambuMonitor_*_aarch64.app.tar.gz` (Apple Silicon) or `BambuMonitor_*_x64.app.tar.gz` (Intel)
            - **Windows**: `BambuMonitor_*_x64-setup.exe` or `.msi`

            ### Quick Start
            1. Download & install
            2. Set environment variables: `BAMBU_IP`, `BAMBU_SN`, `BAMBU_CODE`
            3. Run the app
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: BambuMonitor-${{ matrix.label }}
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/BambuMonitor.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/BambuMonitor.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: BambuMonitor-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
