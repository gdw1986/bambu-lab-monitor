<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bambu 打印机监控</title>
<style>
  :root {
    --bg:        #0a0b0e;
    --surface:   #13151a;
    --border:    #1e2130;
    --accent:    #00d4aa;
    --accent2:   #ff6b35;
    --warn:      #ffb800;
    --err:       #ff4757;
    --text:      #dde1e7;
    --muted:     #5a6070;
    --mono:      'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  header .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  header .logo span { color: var(--muted); }
  .status-dot {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-family: var(--mono);
    letter-spacing: 0.08em;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--err);
    box-shadow: 0 0 6px var(--err);
    transition: background .4s, box-shadow .4s;
  }
  .dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .45 } }

  /* ── Hero Progress ── */
  .hero-progress {
    background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 32px 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .hero-progress::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,176,0,.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-top {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    margin-bottom: 16px;
  }
  .hero-state-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,255,136,.1); border: 1px solid rgba(0,255,136,.3);
    color: #00ff88; border-radius: 99px;
    font-size: 11px; font-family: var(--mono); letter-spacing: .08em;
    padding: 4px 10px; margin-bottom: 8px;
  }
  .hero-state-badge.idle {
    background: rgba(255,176,0,.1); border-color: rgba(255,176,0,.3);
    color: #ffb000;
  }
  .hero-state-badge.finish {
    background: rgba(0,212,170,.1); border-color: rgba(0,212,170,.3);
    color: #00d4aa;
  }
  .hero-state-badge .dot-pulse {
    width: 6px; height: 6px; background: currentColor; border-radius: 50%;
    animation: pulse-dot 1.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)}
  }
  .hero-job-name {
    font-size: 15px; color: var(--text); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 480px;
  }
  .hero-job-name.empty { color: var(--muted); font-weight: 400; font-style: italic; }
  .hero-right { text-align: right; flex-shrink: 0; }
  .hero-pct {
    font-family: var(--mono); font-size: 72px; font-weight: 700;
    color: var(--accent); line-height: 1; letter-spacing: -.02em;
    text-shadow: 0 0 40px rgba(255,176,0,.3);
  }
  .hero-pct-label { font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .hero-bar-wrap { position: relative; }
  .hero-bar {
    height: 10px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden;
  }
  .hero-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #ffb000, #00ff88);
    width: 0%; transition: width 1s cubic-bezier(.22,1,.36,1);
    position: relative;
  }
  .hero-bar-fill::after {
    content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; background: #fff; border-radius: 50%;
    box-shadow: 0 0 12px rgba(255,176,0,.6);
  }
  .hero-meta {
    display: flex; gap: 24px; margin-top: 12px; flex-wrap: wrap;
  }
  .hero-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .hero-meta-label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
  .hero-meta-val { font-size: 15px; font-family: var(--mono); font-weight: 600; color: var(--text); }
  .hero-eta-val { color: #00d4aa; }
  .hero-layer-val { color: #fff; }

  /* ── Job card ── */
  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .job-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 16px 16px 0 0;
  }
  .job-name {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-all;
  }
  .job-name.empty { color: var(--muted); font-style: italic; }
  .job-meta {
    font-size: 11px; color: var(--muted);
    font-family: var(--mono); margin-bottom: 20px;
    display: flex; gap: 16px; flex-wrap: wrap;
  }

  /* ── Progress bar ── */
  .progress-wrap { margin-bottom: 6px; }
  .progress-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
  .progress-pct { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; }
  .progress-track {
    height: 6px; background: var(--border); border-radius: 99px;
    overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #00ffcc);
    border-radius: 99px; width: 0%; transition: width .8s cubic-bezier(.22,1,.36,1);
    position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px; background: #fff; border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .stat-label {
    font-size: 10px; font-family: var(--mono);
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin-bottom: 8px;
  }
  .stat-val {
    font-family: var(--mono); font-size: 22px; font-weight: 600; line-height: 1;
  }
  .stat-val.n { color: var(--accent); }
  .stat-val.w { color: var(--warn); }
  .stat-val.e { color: var(--err); }
  .stat-val.m { color: var(--text); }
  .stat-sub {
    font-size: 11px; color: var(--muted); font-family: var(--mono);
    margin-top: 4px;
  }

  /* ── Temp gauges ── */
  .temps-row {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .gauge-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    flex: 1; min-width: 160px;
    display: flex; flex-direction: column; align-items: center;
  }
  .gauge-label { font-size: 12px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 16px; font-weight: 700; }
  .gauge-wrap { position: relative; width: 110px; height: 110px; }
  .gauge-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gauge-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .gauge-fg {
    fill: none; stroke-width: 8; stroke-linecap: round;
    stroke-dasharray: 0 283; transition: stroke-dasharray .6s cubic-bezier(.22,1,.36,1);
  }
  .gauge-fg.hot  { stroke: var(--accent2); }
  .gauge-fg.warm { stroke: var(--warn); }
  .gauge-fg.cool { stroke: var(--accent); }
  .gauge-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge-temp { font-family: var(--mono); font-size: 24px; font-weight: 800; }
  .gauge-tgt  { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .gauge-temp.h { color: var(--accent2); }
  .gauge-temp.w { color: var(--warn); }
  .gauge-temp.c { color: var(--accent); }

  /* ── State badge ── */
  .state-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 99px;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    border: 1px solid;
  }
  .badge-print  { background: rgba(0,212,170,.1); border-color: var(--accent); color: var(--accent); }
  .badge-idle   { background: rgba(90,96,112,.15); border-color: var(--muted); color: var(--muted); }
  .badge-pause  { background: rgba(255,184,0,.1); border-color: var(--warn); color: var(--warn); }
  .badge-finish { background: rgba(100,100,255,.1); border-color: #8888ff; color: #aaaaff; }
  .badge-error  { background: rgba(255,71,87,.1); border-color: var(--err); color: var(--err); }
  .badge-cool   { background: rgba(0,212,170,.1); border-color: var(--accent); color: var(--accent); }
  .badge-default{ background: rgba(90,96,112,.15); border-color: var(--border); color: var(--text); }

  /* ── AMS slots ── */
  .ams-section { margin-top: 24px; }
  .ams-title {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: .1em; color: var(--muted); margin-bottom: 12px;
  }
  .ams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .ams-slot {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .ams-slot-header { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .ams-color { display: flex; align-items: center; gap: 8px; }
  .ams-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .ams-mat { font-size: 11px; font-family: var(--mono); color: var(--text); }
  .ams-remain { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }

  /* ── Offline overlay ── */
  .offline-banner {
    background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.3);
    border-radius: 10px; padding: 14px 20px;
    font-family: var(--mono); font-size: 12px; color: var(--err);
    margin-bottom: 24px; display: none;
  }
  .offline-banner.show { display: block; animation: fadeIn .4s; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

  /* ── Loading / Error screens ── */
  .screen-cover {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg); gap: 20px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(0,212,170,.15); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .screen-title { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: .1em; }
  .screen-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .06em; }
  .screen-err {
    background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.3);
    border-radius: 12px; padding: 16px 28px;
    font-family: var(--mono); font-size: 12px; color: var(--err);
    text-align: center; max-width: 400px; line-height: 1.7;
  }
  .screen-btn {
    background: rgba(0,212,170,.12); border: 1px solid var(--accent);
    border-radius: 8px; padding: 8px 20px;
    color: var(--accent); font-family: var(--mono); font-size: 12px; cursor: pointer;
    letter-spacing: .06em; transition: background .2s;
  }
  .screen-btn:hover { background: rgba(0,212,170,.22); }

  /* ── Reconnecting banner ── */
  .reconnect-banner {
    background: rgba(255,184,0,.08); border: 1px solid rgba(255,184,0,.3);
    border-radius: 10px; padding: 10px 20px;
    font-family: var(--mono); font-size: 11px; color: var(--warn);
    display: none; align-items: center; gap: 8px; margin-bottom: 16px;
    animation: fadeIn .4s;
  }
  .reconnect-banner.show { display: flex; }
  .reconnect-banner .spinner-sm {
    width: 12px; height: 12px;
    border: 2px solid rgba(255,184,0,.2); border-top-color: var(--warn);
    border-radius: 50%; animation: spin .9s linear infinite; flex-shrink: 0;
  }

  /* ── Animations ── */
  .fade-in { animation: fadeIn .5s ease; }
  .slide-up { animation: slideUp .5s cubic-bezier(.22,1,.36,1); }
  @keyframes slideUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
