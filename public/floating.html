<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打印进度</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 140px;
      height: 140px;
      background: transparent !important;
      overflow: hidden;
      /* macOS transparency fixes */
      color-scheme: dark;
      -webkit-color-scheme: dark;
    }
    
    /* Force webview background transparent on macOS */
    html {
      background-color: transparent !important;
    }
    
    body {
      background-color: transparent !important;
      /* Prevent white flash on load */
      animation: fadeIn 0.1s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      -webkit-app-region: drag;
    }
    
    .progress-container {
      position: relative;
      width: 116px;
      height: 116px;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .progress-ring {
      position: absolute;
      width: 96px;
      height: 96px;
      transform: rotate(-90deg);
    }
    
    .progress-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 5;
    }
    
    .progress-ring-fill {
      fill: none;
      stroke: #00d4ff;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 251.2;
      stroke-dashoffset: 251.2;
      transition: stroke-dashoffset 0.3s ease;
    }
    
    .progress-text {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1;
    }

    .progress-text .percent {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .status-icon {
      position: absolute;
      top: 8px;
      font-size: 14px;
    }
    
    .info-display {
      position: absolute;
      bottom: 22px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    .info-display.visible {
      opacity: 1;
    }
    
    /* Status colors */
    .printing .progress-ring-fill { stroke: #ffb000; }
    .paused .progress-ring-fill { stroke: #ff8c00; }
    .completed .progress-ring-fill { stroke: #00d4aa; }
    .error .progress-ring-fill { stroke: #ff4545; }
    .idle .progress-ring-fill { stroke: #647e8c; }
    
    .close-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.6);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      -webkit-app-region: no-drag;
    }
    
    .progress-container:hover .close-btn {
      opacity: 1;
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="progress-container" id="container">
    <svg class="progress-ring" viewBox="0 0 96 96">
      <circle class="progress-ring-bg" cx="48" cy="48" r="40"/>
      <circle class="progress-ring-fill" id="progress-ring" cx="48" cy="48" r="40"/>
    </svg>
    <div class="progress-text">
      <span id="progress-num">0</span><span class="percent">%</span>
    </div>
    <div class="status-icon" id="status-icon">⏸</div>
    <div class="info-display" id="info-display"></div>
    <button class="close-btn" id="close-btn" title="隐藏">×</button>
  </div>

  <script>
    const { listen } = window.__TAURI__.event;
    const { getCurrentWindow } = window.__TAURI__.window;

    const progressRing = document.getElementById('progress-ring');
    const progressNum = document.getElementById('progress-num');
    const statusIcon = document.getElementById('status-icon');
    const container = document.getElementById('container');
    const closeBtn = document.getElementById('close-btn');
    const infoDisplay = document.getElementById('info-display');

    const circumference = 2 * Math.PI * 40;

    let infoItems = [];
    let currentInfoIndex = 0;
    let infoRotationTimer = null;

    // Tauri v2 drag: call startDragging on mousedown on draggable area
    // Works on macOS without -webkit-app-region
    container.addEventListener('mousedown', async (e) => {
      // Don't drag if clicking close button
      if (e.target === closeBtn || closeBtn.contains(e.target)) return;
      try {
        const win = getCurrentWindow();
        await win.startDragging();
      } catch (err) {
        console.error('[Floating] startDragging failed:', err);
      }
    });

    // Touch drag support
    container.addEventListener('touchstart', async (e) => {
      if (e.target === closeBtn || closeBtn.contains(e.target)) return;
      try {
        const win = getCurrentWindow();
        await win.startDragging();
      } catch (err) {
        console.error('[Floating] startDragging failed:', err);
      }
    }, { passive: true });

    function updateProgress(progress, state) {
      console.log('[Floating] updateProgress called:', progress, state);
      const pct = Math.min(100, Math.max(0, progress));
      const offset = circumference - (pct / 100) * circumference;

      progressRing.style.strokeDashoffset = offset;
      progressNum.textContent = Math.round(pct);
      
      container.className = 'progress-container';
      
      const stateUpper = state.toUpperCase();
      if (stateUpper === 'RUNNING' || stateUpper === 'PRINTING') {
        container.classList.add('printing');
        statusIcon.textContent = '🖨';
      } else if (stateUpper === 'PAUSE' || stateUpper === 'PAUSED') {
        container.classList.add('paused');
        statusIcon.textContent = '⏸';
      } else if (stateUpper === 'FINISH' || stateUpper === 'COMPLETED' || stateUpper === 'SUCCESS') {
        container.classList.add('completed');
        statusIcon.textContent = '✅';
      } else if (stateUpper === 'FAIL' || stateUpper === 'ERROR') {
        container.classList.add('error');
        statusIcon.textContent = '❌';
      } else {
        container.classList.add('idle');
        statusIcon.textContent = '⏸';
      }
    }
    
    function formatTime(minutes) {
      if (!minutes || minutes <= 0) return null;
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      if (h > 0) return `${h}h${m}m`;
      return `${m}m`;
    }
    
    function updateInfoDisplay() {
      if (infoItems.length === 0) {
        infoDisplay.textContent = '';
        infoDisplay.classList.remove('visible');
        return;
      }
      
      infoDisplay.classList.remove('visible');
      setTimeout(() => {
        infoDisplay.textContent = infoItems[currentInfoIndex];
        infoDisplay.classList.add('visible');
        currentInfoIndex = (currentInfoIndex + 1) % infoItems.length;
      }, 250);
    }
    
    function startInfoRotation() {
      if (infoRotationTimer) clearInterval(infoRotationTimer);
      if (infoItems.length > 0) {
        updateInfoDisplay();
        infoRotationTimer = setInterval(updateInfoDisplay, 3000);
      }
    }
    
    listen('printer-state', (event) => {
      console.log('[Floating] Received printer-state event:', event.payload);
      const { state, progress, bed_temp, nozzle_temp, remaining_time, job_name } = event.payload;
      updateProgress(progress, state);
      
      // Build info items for rotation
      infoItems = [];
      if (nozzle_temp !== undefined && nozzle_temp > 0) {
        infoItems.push(`喷头: ${nozzle_temp}°C`);
      }
      if (bed_temp !== undefined && bed_temp > 0) {
        infoItems.push(`热床: ${bed_temp}°C`);
      }
      const timeStr = formatTime(remaining_time);
      if (timeStr) {
        infoItems.push(`剩余: ${timeStr}`);
      }
      if (job_name && job_name !== 'Unknown') {
        infoItems.push(job_name.length > 8 ? job_name.substring(0, 8) + '...' : job_name);
      }
      
      currentInfoIndex = 0;
      startInfoRotation();
    }).then(() => {
      console.log('[Floating] Event listener');
    }).catch(err => {
      console.error('[Floating] Failed to register listener:', err);
    });
    
    closeBtn.addEventListener('click', async () => {
      const win = getCurrentWindow();
      await win.hide();
    });
    
    updateProgress(0, 'IDLE');
  </script>
</body>
</html>
